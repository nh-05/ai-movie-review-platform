{% extends 'blog/base.html' %}
{% block title %}Delete Review – CineAI{% endblock %}
{% block content %}
<section class="py-5 mt-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-5">
        <div class="card-dark p-4 text-center">
          <i class="fas fa-trash-alt fa-3x mb-3" style="color:var(--primary)"></i>
          <h4 class="mb-1">Delete Review</h4>
          <p style="color:var(--muted)">Are you sure you want to delete <strong style="color:#fff">{{ post.title }}</strong>?</p>
          <p style="color:rgba(255,255,255,.4);font-size:.85rem;">This action cannot be undone.</p>
          <form method="post" class="d-flex gap-2 justify-content-center mt-3">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger px-4">Yes, Delete</button>
            <a href="/blog/{{ post.pk }}/" class="btn btn-outline-secondary px-4">Cancel</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
