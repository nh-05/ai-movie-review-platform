{% extends 'blog/base.html' %}
{% block title %}Login – CineAI{% endblock %}
{% block content %}
<section class="py-5 mt-5">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-4 col-md-6">
        <div class="card-dark p-4">
          <div class="text-center mb-4">
            <h2 style="font-family:'Bebas Neue',cursive;font-size:2.5rem;">
              <span style="color:#fff">CINE</span><span style="color:var(--primary)">AI</span>
            </h2>
            <p style="color:var(--muted)">Sign in to your account</p>
          </div>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" name="username" class="form-control" placeholder="Your username" required/>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" name="password" class="form-control" placeholder="Your password" required/>
            </div>
            {% if form.errors %}
            <div class="alert alert-danger py-2 mb-3" style="font-size:.85rem;">Invalid username or password.</div>
            {% endif %}
            <button type="submit" class="btn btn-primary-cine w-100">Login</button>
          </form>
          <p class="text-center mt-3" style="color:var(--muted);font-size:.9rem;">
            Don't have an account? <a href="/register/" style="color:var(--primary)">Register</a>
          </p>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
