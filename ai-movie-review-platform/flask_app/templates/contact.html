<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Contact – CineAI Flask</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <style>
    body{background:#0a0a0f;color:#fff;font-family:'Segoe UI',sans-serif;}
    .navbar{background:#12121a;border-bottom:1px solid rgba(255,255,255,.08);}
    .navbar-brand{color:#e94560!important;font-weight:800;}
    .nav-link{color:rgba(255,255,255,.7)!important;}
    .page-hero{background:linear-gradient(135deg,#1c1c28,#0a0a0f);padding:6rem 0 3rem;text-align:center;}
    .form-control{background:#1c1c28!important;color:#fff!important;border:1px solid rgba(255,255,255,.12)!important;}
    .form-label{color:rgba(255,255,255,.7);}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg">
  <div class="container">
    <a class="navbar-brand" href="/">CineAI Flask</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="/about">About</a></li>
        <li class="nav-item"><a class="nav-link active" href="/contact">Contact</a></li>
      </ul>
    </div>
  </div>
</nav>
<section class="page-hero"><div class="container"><h1>Contact Us</h1><p class="text-muted">Send us a message</p></div></section>
<section class="py-5"><div class="container"><div class="row justify-content-center"><div class="col-lg-6">
  <form>
    <div class="mb-3"><label class="form-label">Name</label><input type="text" class="form-control" placeholder="Your name"/></div>
    <div class="mb-3"><label class="form-label">Email</label><input type="email" class="form-control" placeholder="your@email.com"/></div>
    <div class="mb-3"><label class="form-label">Message</label><textarea class="form-control" rows="4" placeholder="Your message..."></textarea></div>
    <button class="btn btn-danger w-100">Send Message</button>
  </form>
</div></div></div></section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
